spring.application.name=SomaraServer
# PostgreSQL (Werte aus docker-compose.yaml als Default)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:somaradb}
spring.datasource.username=${DB_USER:somara}
spring.datasource.password=${DB_PASSWORD:somaraDBPassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema-Verwaltung nur ueber Migrationen
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.security.jwt.secret=Q29kZXhTdG9uZ0p3dFNlY3JldEtleUZvclByb2plY3RTZXRVcEFuZENoYW5nZU1l
app.security.jwt.expiration-ms=86400000
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Admin bootstrap user (bitte anpassen)
app.security.admin.username=admin
app.security.admin.password=test1234
